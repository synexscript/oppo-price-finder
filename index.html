<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Barcode Inventory</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
body{
    margin:0;
    padding:20px;
    background:#0f172a;
    color:white;
    font-family:-apple-system,sans-serif;
}
.container{
    max-width:600px;
    margin:auto;
}
h1{
    text-align:center;
}
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#22d3ee;
    color:black;
    font-weight:bold;
    margin-top:10px;
}
input{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:10px;
    box-sizing:border-box;
}
#reader{
    margin-top:15px;
}
.card{
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}
.hidden{
    display:none;
}
</style>
</head>
<body>
<div class="container">
<h1>📱 Inventory Scanner</h1>
<button onclick="startScanner()">
📷 Scan Barcode / QR
</button>
<div id="reader"></div>
<div id="result"></div>
<div id="addForm" class="hidden">
<input id="ram" placeholder="RAM (e.g. 8GB)">
<input id="storage" placeholder="Storage (e.g. 256GB)">
<input id="price" placeholder="Price">
<button onclick="saveDevice()">
💾 Save Device
</button>
</div>
</div>
<script>
let currentCode = "";
let inventory =
JSON.parse(localStorage.getItem("inventory")) || {};
function startScanner(){
const scanner = new Html5Qrcode("reader");
scanner.start(
{ facingMode: "environment" },
{
fps:10,
qrbox:250
},
function(decodedText){
currentCode = decodedText;
scanner.stop();
lookupCode(decodedText);
},
function(error){}
);
}
function lookupCode(code){
const result =
document.getElementById("result");
if(inventory[code]){
const d = inventory[code];
result.innerHTML = `
<div class="card">
<h3>Device Found</h3>
<p><b>RAM:</b> ${d.ram}</p>
<p><b>Storage:</b> ${d.storage}</p>
<p><b>Price:</b> ${d.price}</p>
</div>
`;
document
.getElementById("addForm")
.classList.add("hidden");
}else{
result.innerHTML = `
<div class="card">
<b>New Barcode Detected</b><br>
Add details below.
</div>
`;
document
.getElementById("addForm")
.classList.remove("hidden");
}
}
function saveDevice(){
const ram =
document.getElementById("ram").value.trim();
const storage =
document.getElementById("storage").value.trim();
const price =
document.getElementById("price").value.trim();
if(!ram || !storage || !price){
alert("Fill all fields");
return;
}
inventory[currentCode] = {
ram: ram,
storage: storage,
price: price
};
localStorage.setItem(
"inventory",
JSON.stringify(inventory)
);
alert("Saved Successfully");
lookupCode(currentCode);
}
</script>
</body>
</html>
