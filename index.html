<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IMEI Scanner Inventory</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
body{
font-family:-apple-system,sans-serif;
background:#0f172a;
color:white;
padding:15px;
}
.container{
max-width:600px;
margin:auto;
}
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#22d3ee;
font-weight:bold;
}
input{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:10px;
box-sizing:border-box;
}
.card{
background:#1e293b;
padding:15px;
margin-top:15px;
border-radius:12px;
}
#reader{
margin-top:15px;
border-radius:12px;
overflow:hidden;
}
</style>
</head>
<body>
<div class="container">
<h2>📱 IMEI Inventory Scanner</h2>
<button onclick="startScanner()">
📷 Scan IMEI Barcode
</button>
<div id="reader"></div>
<div id="result"></div>
<div id="form" style="display:none;">
<input id="model" placeholder="Model">
<input id="ram" placeholder="RAM + Storage">
<input id="price" placeholder="Price">
<button onclick="saveDevice()">
Save Device
</button>
</div>
</div>
<script>
let currentIMEI = "";
let inventory =
JSON.parse(localStorage.getItem("inventory")) || {};
function startScanner(){
const scanner =
new Html5Qrcode("reader");
scanner.start(
{ facingMode: "environment" },
{
fps:10,
qrbox:250
},
function(decodedText){
currentIMEI = decodedText;
scanner.stop();
checkIMEI(decodedText);
},
function(error){}
);
}
function checkIMEI(imei){
const result =
document.getElementById("result");
if(inventory[imei]){
const d = inventory[imei];
result.innerHTML = `
<div class="card">
<h3>${d.model}</h3>
<p>RAM: ${d.ram}</p>
<p>Price: ${d.price}</p>
<p>IMEI: ${imei}</p>
</div>
`;
document.getElementById("form").style.display="none";
}else{
result.innerHTML = `
<div class="card">
New IMEI Detected:<br>
${imei}
</div>
`;
document.getElementById("form").style.display="block";
}
}
function saveDevice(){
inventory[currentIMEI] = {
model:document.getElementById("model").value,
ram:document.getElementById("ram").value,
price:document.getElementById("price").value
};
localStorage.setItem(
"inventory",
JSON.stringify(inventory)
);
alert("Saved");
checkIMEI(currentIMEI);
}
</script>
</body>
</html>
