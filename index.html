<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IMEI Inventory</title>
<style>
body{
font-family:-apple-system,Arial,sans-serif;
background:#111827;
color:white;
padding:20px;
}
.container{
max-width:500px;
margin:auto;
}
h2{
text-align:center;
color:#00ffcc;
}
input{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:10px;
box-sizing:border-box;
}
button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:10px;
background:#00ffcc;
color:black;
font-weight:bold;
}
.card{
background:#1f2937;
padding:15px;
margin-top:15px;
border-radius:12px;
}
.hidden{
display:none;
}
</style>
</head>
<body>
<div class="container">
<h2>IMEI Inventory</h2>
<input
id="imei"
placeholder="Scan or Enter IMEI">
<button onclick="searchIMEI()">
Search IMEI
</button>
<div id="saveSection" class="hidden">
<input id="model" placeholder="Phone Model">
<input id="ram" placeholder="RAM + Storage">
<input id="price" placeholder="Price">
<button onclick="savePhone()">
Save Device
</button>
</div>
<div id="result"></div>
</div>
<script>
let inventory =
JSON.parse(localStorage.getItem("inventory")) || {};
function searchIMEI(){
const imei =
document.getElementById("imei").value.trim();
const result =
document.getElementById("result");
if(!imei){
alert("Enter IMEI");
return;
}
if(inventory[imei]){
const p = inventory[imei];
result.innerHTML = `
<div class="card">
<h3>${p.model}</h3>
<p>RAM: ${p.ram}</p>
<p>Price: ${p.price}</p>
<p>IMEI: ${imei}</p>
</div>
`;
document
.getElementById("saveSection")
.classList.add("hidden");
}else{
result.innerHTML =
"<div class='card'>IMEI Not Found. Add Details Below.</div>";
document
.getElementById("saveSection")
.classList.remove("hidden");
}
}
function savePhone(){
const imei =
document.getElementById("imei").value.trim();
const model =
document.getElementById("model").value.trim();
const ram =
document.getElementById("ram").value.trim();
const price =
document.getElementById("price").value.trim();
if(!imei || !model || !ram || !price){
alert("Fill all fields");
return;
}
inventory[imei] = {
model:model,
ram:ram,
price:price
};
localStorage.setItem(
"inventory",
JSON.stringify(inventory)
);
alert("Saved Successfully");
searchIMEI();
}
</script>
</body>
</html>
